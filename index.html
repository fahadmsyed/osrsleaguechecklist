<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSRS Leagues 5 - Task Checklist</title>
<style>
  :root {
    --gold: #c8a84b;
    --gold-light: #f0d060;
    --dark: #1a1209;
    --dark2: #241a0a;
    --dark3: #2e2010;
    --panel: #1e1608;
    --border: #5a4010;
    --border-light: #8a6820;
    --text: #e8d8a0;
    --text-dim: #a89060;
    --green: #4a8c3f;
    --green-light: #6abf5e;
    --red: #8c3f3f;
    --blue: #3f6a8c;
    --blue-light: #5fa0c8;
    --purple: #7a4a9c;
    --section-colors: #c8a84b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(200,168,75,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(200,168,75,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .layout {
    display: flex;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px;
    position: relative;
    z-index: 1;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    position: sticky;
    top: 16px;
    height: calc(100vh - 32px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }

  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: var(--dark2); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .inv-panel {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .inv-panel-header {
    background: linear-gradient(135deg, var(--dark3), var(--dark2));
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .inv-panel-header h3 {
    color: var(--gold);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .inv-icon { font-size: 16px; }

  .inv-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    padding: 8px;
    min-height: 60px;
  }

  .inv-slot {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 3px;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3px;
    cursor: default;
    position: relative;
    transition: border-color 0.2s;
  }

  .inv-slot:hover { border-color: var(--gold); }

  .inv-slot .item-icon { font-size: 18px; line-height: 1; }
  .inv-slot .item-name {
    font-size: 8px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.1;
    margin-top: 2px;
  }
  .inv-slot .item-qty {
    position: absolute;
    top: 1px;
    right: 2px;
    font-size: 8px;
    color: var(--gold);
    font-weight: bold;
  }

  .inv-slot.equipped {
    border-color: var(--blue);
    background: rgba(63, 106, 140, 0.15);
  }

  .inv-location {
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    font-style: italic;
  }

  /* Progress panel */
  .progress-panel {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }

  .progress-panel h3 {
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .progress-bar-wrap {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 3px;
    height: 14px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-light));
    border-radius: 3px;
    transition: width 0.4s ease;
    min-width: 0;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .reset-btn {
    width: 100%;
    padding: 6px;
    background: var(--red);
    border: 1px solid #c05050;
    color: #ffd0d0;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: background 0.2s;
    margin-top: 6px;
  }
  .reset-btn:hover { background: #a04040; }

  /* Nav panel */
  .nav-panel {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .nav-panel-header {
    background: linear-gradient(135deg, var(--dark3), var(--dark2));
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .nav-list { padding: 6px 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: var(--text-dim);
    font-size: 11px;
  }
  .nav-item:hover { background: var(--dark3); color: var(--text); }

  .nav-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .nav-item.done .nav-dot { background: var(--green-light); }
  .nav-item.partial .nav-dot { background: var(--gold); }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .page-header {
    background: linear-gradient(135deg, var(--dark3), var(--dark2));
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    text-align: center;
  }

  .page-header h1 {
    color: var(--gold-light);
    font-size: 26px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(200,168,75,0.4);
  }

  .page-header p {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 4px;
  }

  /* ── SECTIONS ── */
  .section {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: linear-gradient(135deg, var(--dark3), var(--dark2));
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .section-header:hover { background: linear-gradient(135deg, #382810, #2e2010); }

  .section-icon { font-size: 20px; flex-shrink: 0; }

  .section-title {
    flex: 1;
  }

  .section-title h2 {
    color: var(--gold);
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .section-title .section-sub {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 1px;
  }

  .section-progress {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .section-count {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 600;
  }

  .section-mini-bar {
    width: 80px;
    height: 6px;
    background: var(--dark3);
    border-radius: 3px;
    overflow: hidden;
  }

  .section-mini-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-light));
    border-radius: 3px;
    transition: width 0.4s;
  }

  .section-chevron {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform 0.2s;
    margin-left: 4px;
  }

  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  .section-body { padding: 8px 0; }

  /* ── TASKS ── */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 16px;
    border-bottom: 1px solid rgba(90,64,16,0.3);
    transition: background 0.15s;
    cursor: pointer;
  }

  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: rgba(255,255,255,0.03); }
  .task-item.done { background: rgba(74,140,63,0.06); }
  .task-item.done:hover { background: rgba(74,140,63,0.1); }

  .task-cb {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border-light);
    border-radius: 3px;
    background: var(--dark3);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    position: relative;
    transition: all 0.15s;
  }

  .task-cb:checked {
    background: var(--green);
    border-color: var(--green-light);
  }

  .task-cb:checked::after {
    content: '✓';
    position: absolute;
    top: -2px;
    left: 1px;
    color: white;
    font-size: 12px;
    font-weight: bold;
  }

  .task-text {
    flex: 1;
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    transition: color 0.15s;
  }

  .task-item.done .task-text {
    color: var(--text-dim);
    text-decoration: line-through;
    text-decoration-color: rgba(168,144,96,0.5);
  }

  .task-num {
    color: var(--border-light);
    font-size: 10px;
    font-weight: 600;
    min-width: 24px;
    text-align: right;
    margin-top: 3px;
    flex-shrink: 0;
  }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .tag-warn { background: rgba(200,100,40,0.3); color: #f0a070; border: 1px solid rgba(200,100,40,0.5); }
  .tag-opt { background: rgba(120,80,160,0.3); color: #c0a0e0; border: 1px solid rgba(120,80,160,0.5); }
  .tag-bank { background: rgba(63,106,140,0.3); color: #90c8e8; border: 1px solid rgba(63,106,140,0.5); }
  .tag-tele { background: rgba(140,63,140,0.3); color: #e090e0; border: 1px solid rgba(140,63,140,0.5); }

  /* Inventory inline card */
  .inv-card {
    margin: 4px 16px 8px;
    background: rgba(30,22,8,0.8);
    border: 1px solid var(--blue);
    border-radius: 6px;
    overflow: hidden;
  }

  .inv-card-header {
    background: rgba(63,106,140,0.2);
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--blue-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .inv-card-items {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px;
  }

  .inv-chip {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .inv-chip .chip-icon { font-size: 14px; }
  .inv-chip.equipped-chip { border-color: var(--blue); color: var(--blue-light); }
  .inv-chip.new-chip { border-color: var(--green-light); color: var(--green-light); background: rgba(74,140,63,0.1); }

  /* Note blocks */
  .note-block {
    margin: 4px 16px 8px;
    background: rgba(120,90,20,0.15);
    border-left: 3px solid var(--gold);
    border-radius: 0 4px 4px 0;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .note-block strong { color: var(--gold); }

  /* Section dividers */
  .sub-header {
    padding: 8px 16px 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-top: 1px dashed var(--border);
    margin-top: 4px;
  }

  .sub-header:first-child { border-top: none; margin-top: 0; }

  /* Scrollbar for main */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--dark2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

  @media (max-width: 900px) {
    .layout { flex-direction: column; }
    .sidebar { position: static; height: auto; width: 100%; }
  }
</style>
</head>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

function getState() {
  try { return JSON.parse(localStorage.getItem('osrs_leagues_v5') || '{}'); }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem('osrs_leagues_v5', JSON.stringify(state));
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem('osrs_leagues_v5');
  document.querySelectorAll('.task-cb').forEach(cb => {
    cb.checked = false;
    cb.closest('.task-item').classList.remove('done');
  });
  updateAll();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────

function buildInvCard(inv) {
  const chips = inv.items.map(item => {
    const cls = item.equipped ? 'inv-chip equipped-chip' : 'inv-chip new-chip';
    const qty = item.qty ? ` <span style="color:var(--gold);font-size:10px">${item.qty}</span>` : '';
    const eq = item.equipped ? ' <span style="font-size:9px;color:var(--blue-light)">(eq)</span>' : '';
    return `<div class="${cls}"><span class="chip-icon">${item.icon}</span>${item.name}${qty}${eq}</div>`;
  }).join('');
  return `
    <div class="inv-card">
      <div class="inv-card-header">🎒 ${inv.label}</div>
      <div class="inv-card-items">${chips}</div>
    </div>`;
}

function buildTaskHTML(task, checked) {
  const doneCls = checked ? ' done' : '';
  const tagMap = { warn: 'tag-warn', opt: 'tag-opt', bank: 'tag-bank', tele: 'tag-tele' };
  const tagLabel = { warn: '⚠ Note', opt: 'Optional', bank: '🏦 Bank', tele: '✈ Tele' };
  const tagHTML = task.tag ? `<span class="tag ${tagMap[task.tag]}">${tagLabel[task.tag]}</span>` : '';
  const invHTML = task.inv ? buildInvCard(task.inv) : '';

  return `
    <div class="task-item${doneCls}" data-id="${task.id}" onclick="toggleTask(${task.id}, this)">
      <span class="task-num">${task.id}</span>
      <input class="task-cb" type="checkbox" ${checked ? 'checked' : ''} onclick="event.stopPropagation();toggleTask(${task.id},this.closest('.task-item'))">
      <span class="task-text">${task.text}${tagHTML}</span>
    </div>
    ${invHTML}`;
}

function buildSectionHTML(section, state) {
  const total = section.tasks.length;
  const done = section.tasks.filter(t => state[t.id]).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const optBadge = section.optional ? '<span class="tag tag-opt" style="margin-left:8px">Optional</span>' : '';

  const tasksHTML = section.tasks.map(t => buildTaskHTML(t, !!state[t.id])).join('');

  return `
    <div class="section" id="section-${section.id}">
      <div class="section-header" onclick="toggleSection('${section.id}')">
        <span class="section-icon">${section.icon}</span>
        <div class="section-title">
          <h2>${section.title}${optBadge}</h2>
          <div class="section-sub">${section.sub}</div>
        </div>
        <div class="section-progress">
          <span class="section-count">${done}/${total}</span>
          <div class="section-mini-bar">
            <div class="section-mini-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">${tasksHTML}</div>
    </div>`;
}

function buildNavHTML(section, state) {
  const total = section.tasks.length;
  const done = section.tasks.filter(t => state[t.id]).length;
  const cls = done === total ? 'done' : done > 0 ? 'partial' : '';
  return `<a class="nav-item ${cls}" href="#section-${section.id}">
    <span class="nav-dot"></span>${section.title}
  </a>`;
}

// ─────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────

function toggleTask(id, el) {
  const state = getState();
  const cb = el.querySelector('.task-cb');
  const newVal = !state[id];
  state[id] = newVal;
  saveState(state);
  if (cb) cb.checked = newVal;
  el.classList.toggle('done', newVal);
  updateAll();
}

function toggleSection(id) {
  const el = document.getElementById('section-' + id);
  el.classList.toggle('collapsed');
}

// ─────────────────────────────────────────────
// INVENTORY SIDEBAR
// ─────────────────────────────────────────────

// Map: task id -> inventory snapshot that becomes active after this task is checked
const INV_SNAPSHOTS = [];
SECTIONS.forEach(s => s.tasks.forEach(t => {
  if (t.inv) INV_SNAPSHOTS.push({ id: t.id, inv: t.inv });
}));

function updateSidebarInv(state) {
  // Find the latest checked task that has an inventory snapshot
  let currentSnap = null;
  for (let i = INV_SNAPSHOTS.length - 1; i >= 0; i--) {
    if (state[INV_SNAPSHOTS[i].id]) {
      currentSnap = INV_SNAPSHOTS[i].inv;
      break;
    }
  }

  const grid = document.getElementById('sidebar-inv');
  const loc = document.getElementById('sidebar-location');

  if (!currentSnap) {
    grid.innerHTML = Array(28).fill('<div class="inv-slot"><span class="item-icon" style="opacity:0.2">⬜</span></div>').join('');
    loc.textContent = '📍 Starting out...';
    return;
  }

  loc.textContent = currentSnap.location;
  const slots = [];
  currentSnap.items.forEach(item => {
    const cls = item.equipped ? 'inv-slot equipped' : 'inv-slot';
    const qty = item.qty ? `<span class="item-qty">${item.qty}</span>` : '';
    slots.push(`<div class="${cls}" title="${item.name}${item.equipped ? ' (equipped)' : ''}">${qty}<span class="item-icon">${item.icon}</span><span class="item-name">${item.name}</span></div>`);
  });
  while (slots.length < 28) {
    slots.push('<div class="inv-slot" style="opacity:0.2"><span class="item-icon">⬜</span></div>');
  }
  grid.innerHTML = slots.join('');
}

// ─────────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────────

function updateAll() {
  const state = getState();
  let totalTasks = 0, totalDone = 0;

  SECTIONS.forEach(section => {
    const total = section.tasks.length;
    const done = section.tasks.filter(t => state[t.id]).length;
    totalTasks += total;
    totalDone += done;
    const pct = total ? Math.round(done / total * 100) : 0;

    const countEl = document.querySelector(`#section-${section.id} .section-count`);
    const fillEl = document.querySelector(`#section-${section.id} .section-mini-fill`);
    if (countEl) countEl.textContent = `${done}/${total}`;
    if (fillEl) fillEl.style.width = pct + '%';
  });

  const gPct = totalTasks ? Math.round(totalDone / totalTasks * 100) : 0;
  document.getElementById('global-bar').style.width = gPct + '%';
  document.getElementById('global-count').textContent = `${totalDone} / ${totalTasks} tasks`;
  document.getElementById('global-pct').textContent = gPct + '%';

  updateNav(state);
  updateSidebarInv(state);
}

function updateNav(state) {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = SECTIONS.map(s => buildNavHTML(s, state)).join('');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

function init() {
  const state = getState();
  const container = document.getElementById('sections-container');
  container.innerHTML = SECTIONS.map(s => buildSectionHTML(s, state)).join('');
  updateAll();
}

init();
</script>
</body>
</html>
