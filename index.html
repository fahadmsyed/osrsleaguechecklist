<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSRS Leagues 5 - Task Checklist</title>
<style>
  :root {
    --gold: #c8a84b; --gold-light: #f0d060; --dark: #1a1209; --dark2: #241a0a;
    --dark3: #2e2010; --panel: #1e1608; --border: #5a4010; --border-light: #8a6820;
    --text: #e8d8a0; --text-dim: #a89060; --green: #4a8c3f; --green-light: #6abf5e;
    --red: #8c3f3f; --blue: #3f6a8c; --blue-light: #5fa0c8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(ellipse at 20% 20%, rgba(200,168,75,0.04) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .layout { display: flex; gap: 16px; max-width: 1400px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

  .sidebar { width: 260px; flex-shrink: 0; position: sticky; top: 16px; height: calc(100vh - 32px); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: var(--dark2); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .inv-panel { background: var(--panel); border: 2px solid var(--border); border-radius: 6px; overflow: hidden; }
  .inv-panel-header { background: linear-gradient(135deg, var(--dark3), var(--dark2)); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .inv-panel-header h3 { color: var(--gold); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; padding: 8px; }
  .inv-slot { background: var(--dark3); border: 1px solid var(--border); border-radius: 3px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px; position: relative; cursor: default; transition: border-color 0.2s; }
  .inv-slot:hover { border-color: var(--gold); }
  .inv-slot.equipped { border-color: var(--blue); background: rgba(63,106,140,0.15); }
  .inv-slot .item-icon { font-size: 17px; line-height: 1; }
  .inv-slot .item-name { font-size: 7.5px; color: var(--text-dim); text-align: center; line-height: 1.1; margin-top: 1px; }
  .inv-slot .item-qty { position: absolute; top: 1px; right: 2px; font-size: 8px; color: var(--gold); font-weight: bold; }
  .inv-location { padding: 5px 10px; font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--border); font-style: italic; }
  .inv-label { padding: 4px 10px; font-size: 10px; color: var(--blue-light); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

  .progress-panel { background: var(--panel); border: 2px solid var(--border); border-radius: 6px; padding: 12px; }
  .progress-panel h3 { color: var(--gold); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .progress-bar-wrap { background: var(--dark3); border: 1px solid var(--border); border-radius: 3px; height: 14px; overflow: hidden; margin-bottom: 4px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-light)); border-radius: 3px; transition: width 0.4s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
  .reset-btn { width: 100%; padding: 6px; background: var(--red); border: 1px solid #c05050; color: #ffd0d0; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.2s; }
  .reset-btn:hover { background: #a04040; }

  .nav-panel { background: var(--panel); border: 2px solid var(--border); border-radius: 6px; overflow: hidden; }
  .nav-panel-header { background: linear-gradient(135deg, var(--dark3), var(--dark2)); border-bottom: 1px solid var(--border); padding: 8px 12px; color: var(--gold); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .nav-list { padding: 6px 0; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 4px 10px; cursor: pointer; transition: background 0.15s; text-decoration: none; color: var(--text-dim); font-size: 11px; }
  .nav-item:hover { background: var(--dark3); color: var(--text); }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .nav-item.done .nav-dot { background: var(--green-light); }
  .nav-item.partial .nav-dot { background: var(--gold); }

  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }
  .page-header { background: linear-gradient(135deg, var(--dark3), var(--dark2)); border: 2px solid var(--border); border-radius: 8px; padding: 20px 24px; text-align: center; }
  .page-header h1 { color: var(--gold-light); font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 8px rgba(200,168,75,0.4); }
  .page-header p { color: var(--text-dim); font-size: 12px; margin-top: 4px; }

  .section { background: var(--panel); border: 2px solid var(--border); border-radius: 8px; overflow: hidden; }
  .section-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: linear-gradient(135deg, var(--dark3), var(--dark2)); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; transition: background 0.2s; }
  .section-header:hover { background: linear-gradient(135deg, #382810, #2e2010); }
  .section-icon { font-size: 20px; flex-shrink: 0; }
  .section-title { flex: 1; }
  .section-title h2 { color: var(--gold); font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .section-title .section-sub { color: var(--text-dim); font-size: 11px; margin-top: 1px; }
  .section-progress { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .section-count { font-size: 12px; color: var(--text-dim); font-weight: 600; }
  .section-mini-bar { width: 80px; height: 6px; background: var(--dark3); border-radius: 3px; overflow: hidden; }
  .section-mini-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-light)); border-radius: 3px; transition: width 0.4s; }
  .section-chevron { color: var(--text-dim); font-size: 12px; transition: transform 0.2s; margin-left: 4px; }
  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }
  .section-body { padding: 8px 0; }

  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 16px; border-bottom: 1px solid rgba(90,64,16,0.3); transition: background 0.15s; cursor: pointer; }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: rgba(255,255,255,0.03); }
  .task-item.done { background: rgba(74,140,63,0.06); }
  .task-item.done:hover { background: rgba(74,140,63,0.1); }
  .task-cb { appearance: none; width: 16px; height: 16px; border: 2px solid var(--border-light); border-radius: 3px; background: var(--dark3); cursor: pointer; flex-shrink: 0; margin-top: 2px; position: relative; transition: all 0.15s; }
  .task-cb:checked { background: var(--green); border-color: var(--green-light); }
  .task-cb:checked::after { content: '✓'; position: absolute; top: -2px; left: 1px; color: white; font-size: 12px; font-weight: bold; }
  .task-text { flex: 1; color: var(--text); font-size: 13px; line-height: 1.5; transition: color 0.15s; }
  .task-item.done .task-text { color: var(--text-dim); text-decoration: line-through; text-decoration-color: rgba(168,144,96,0.5); }
  .task-num { color: var(--border-light); font-size: 10px; font-weight: 600; min-width: 24px; text-align: right; margin-top: 3px; flex-shrink: 0; }

  .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; margin-left: 6px; vertical-align: middle; }
  .tag-warn { background: rgba(200,100,40,0.3); color: #f0a070; border: 1px solid rgba(200,100,40,0.5); }
  .tag-opt  { background: rgba(120,80,160,0.3); color: #c0a0e0; border: 1px solid rgba(120,80,160,0.5); }
  .tag-bank { background: rgba(63,106,140,0.3); color: #90c8e8; border: 1px solid rgba(63,106,140,0.5); }
  .tag-tele { background: rgba(140,63,140,0.3); color: #e090e0; border: 1px solid rgba(140,63,140,0.5); }
  .tag-combine { background: rgba(40,140,100,0.3); color: #70d0a0; border: 1px solid rgba(40,140,100,0.5); }

  .inv-card { margin: 2px 16px 8px; background: rgba(30,22,8,0.8); border: 1px solid var(--blue); border-radius: 6px; overflow: hidden; }
  .inv-card-header { background: rgba(63,106,140,0.2); padding: 5px 10px; font-size: 11px; font-weight: 700; color: var(--blue-light); text-transform: uppercase; letter-spacing: 0.5px; }
  .inv-card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; padding: 6px; }
  .inv-card-slot { background: var(--dark3); border: 1px solid var(--border); border-radius: 3px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px; position: relative; }
  .inv-card-slot.eq { border-color: var(--blue); background: rgba(63,106,140,0.15); }
  .inv-card-slot.new { border-color: var(--green-light); background: rgba(74,140,63,0.1); }
  .inv-card-slot.gone { border-color: var(--red); background: rgba(140,63,63,0.1); opacity: 0.6; }
  .inv-card-slot .s-icon { font-size: 16px; line-height: 1; }
  .inv-card-slot .s-name { font-size: 7px; color: var(--text-dim); text-align: center; line-height: 1.1; margin-top: 1px; }
  .inv-card-slot .s-qty { position: absolute; top: 1px; right: 2px; font-size: 7.5px; color: var(--gold); font-weight: bold; }
  .inv-card-note { padding: 4px 8px 6px; font-size: 10px; color: var(--text-dim); font-style: italic; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--dark2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  @media (max-width: 900px) { .layout { flex-direction: column; } .sidebar { position: static; height: auto; width: 100%; } }
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="progress-panel">
    <h3>⚔ Overall Progress</h3>
    <div class="progress-bar-wrap"><div class="progress-bar" id="global-bar" style="width:0%"></div></div>
    <div class="progress-label"><span id="global-count">0 / 0 tasks</span><span id="global-pct">0%</span></div>
    <button class="reset-btn" onclick="resetAll()">✕ Reset All</button>
  </div>
  <div class="inv-panel">
    <div class="inv-panel-header"><span style="font-size:16px">🎒</span><h3>Current Inventory</h3></div>
    <div class="inv-label" id="sidebar-label">Starting out...</div>
    <div class="inv-grid" id="sidebar-inv"></div>
    <div class="inv-location" id="sidebar-location">📍 —</div>
  </div>
  <div class="nav-panel">
    <div class="nav-panel-header">📋 Sections</div>
    <div class="nav-list" id="nav-list"></div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <h1>⚔ Leagues V — Task Checklist</h1>
    <p>Progress saves automatically · Endless Harvest / Woodsman build · Green = new, Blue = equipped, Red = consumed</p>
  </div>
  <div id="sections-container"></div>
</main>
</div>

<script>

// items: { icon, name, qty?, eq?=equipped, new?=highlight green, gone?=struck }
// gone items are shown faded-red (recently used/dropped) in inline cards only.

function slot(icon, name, qty, flags) {
  return { icon, name, qty: qty||null, eq: !!(flags&&flags.eq), new: !!(flags&&flags.new), gone: !!(flags&&flags.gone) };
}
const E = (i,n,q) => slot(i,n,q,{eq:true});
const N = (i,n,q) => slot(i,n,q,{new:true});
const G = (i,n,q) => slot(i,n,q,{gone:true});

// Sidebar shows most-recently-checked snapshot.

  { id: 17, label: 'Bought clothing', location: '📍 Varlamore Clothing Shop',

  { id: 24, label: 'After burn + fletch', location: '📍 South Varlamore',

    items: [N('🪙','Coins')] },

  { id: 29, label: 'Made molten glass → banked it', location: '📍 Varlamore Furnace/Bank',
    items: [slot('🪙','Coins'), slot('🫧','Pipe'), G('🪣','Sand×10','→'), G('🧫','Ash×10','→'), slot('🔮','Molten Glass','×10 BANKED')] ,

  { id: 30, label: 'Bought second round of supplies', location: '📍 Charter Shop, Varlamore',

  { id: 31, label: 'Made oil lanterns (20 Crafting)', location: '📍 Varlamore Furnace',

  { id: 63, label: 'Cooked rabbit (ate 1)', location: '📍 Range, near Aldarin Charters',

  { id: 69, label: 'Bought feathers + big net', location: '📍 Sunset Coast Fishing Shop',

// ── INV LOOKUP ──────────────────────────────────────────────────────────────
// Build map: taskId → snapshot
const INV_MAP = {};
INV.forEach(snap => { INV_MAP[snap.id] = snap; });

// Sorted list of task IDs that have snapshots (for sidebar lookup)
const INV_IDS = INV.map(s => s.id).sort((a,b) => a-b);

// ── STATE ──────────────────────────────────────────────────────────────────
function getState() { try { return JSON.parse(localStorage.getItem('osrs_leagues_v5') || '{}'); } catch { return {}; } }
function saveState(s) { localStorage.setItem('osrs_leagues_v5', JSON.stringify(s)); }

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem('osrs_leagues_v5');
  document.querySelectorAll('.task-cb').forEach(cb => { cb.checked = false; cb.closest('.task-item').classList.remove('done'); });
  updateAll();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderSlotGrid(items, gridClass) {
  const slots = items.map(item => {
    let cls = gridClass + '-slot';
    if (item.eq) cls += ' eq';
    if (item.new) cls += ' new';
    if (item.gone) cls += ' gone';
    const qty = item.qty ? `<span class="s-qty">${item.qty}</span>` : '';
    return `<div class="${cls}" title="${item.name}${item.eq?' (equipped)':''}">${qty}<span class="s-icon">${item.icon}</span><span class="s-name">${item.name}</span></div>`;
  });
  while (slots.length < 4) slots.push(`<div class="${gridClass}-slot" style="opacity:0.15"><span class="s-icon">⬜</span></div>`);
  return slots.join('');
}

function buildInvCard(taskId) {
  const snap = INV_MAP[taskId];
  if (!snap) return '';
  const noteHTML = snap.note ? `<div class="inv-card-note">ℹ️ ${snap.note}</div>` : '';
  return `
    <div class="inv-card">
      <div class="inv-card-header">🎒 ${snap.label}</div>
      <div class="inv-card-grid">${renderSlotGrid(snap.items, 'inv-card')}</div>
      ${noteHTML}
    </div>`;
}

function buildTaskHTML(task, checked) {
  const doneCls = checked ? ' done' : '';
  const tagMap = { warn:'tag-warn', opt:'tag-opt', bank:'tag-bank', tele:'tag-tele', combine:'tag-combine' };
  const tagLabel = { warn:'⚠ Note', opt:'Optional', bank:'🏦 Bank', tele:'✈ Tele', combine:'⚗ Combine' };
  const tagHTML = task.tag ? `<span class="tag ${tagMap[task.tag]}">${tagLabel[task.tag]}</span>` : '';
  const invHTML = INV_MAP[task.id] ? buildInvCard(task.id) : '';
  return `
    <div class="task-item${doneCls}" data-id="${task.id}" onclick="toggleTask(${task.id},this)">
      <span class="task-num">${task.id}</span>
      <input class="task-cb" type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggleTask(${task.id},this.closest('.task-item'))">
      <span class="task-text">${task.text}${tagHTML}</span>
    </div>${invHTML}`;
}

function buildSectionHTML(section, state) {
  const total = section.tasks.length;
  const done = section.tasks.filter(t => state[t.id]).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const optBadge = section.optional ? '<span class="tag tag-opt" style="margin-left:8px">Optional</span>' : '';
  return `
    <div class="section" id="section-${section.id}">
      <div class="section-header" onclick="toggleSection('${section.id}')">
        <span class="section-icon">${section.icon}</span>
        <div class="section-title"><h2>${section.title}${optBadge}</h2><div class="section-sub">${section.sub}</div></div>
        <div class="section-progress"><span class="section-count">${done}/${total}</span>
          <div class="section-mini-bar"><div class="section-mini-fill" style="width:${pct}%"></div></div>
        </div>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">${section.tasks.map(t => buildTaskHTML(t, !!state[t.id])).join('')}</div>
    </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────
function toggleTask(id, el) {
  const state = getState();
  const newVal = !state[id];
  state[id] = newVal;
  saveState(state);
  const cb = el.querySelector('.task-cb');
  if (cb) cb.checked = newVal;
  el.classList.toggle('done', newVal);
  updateAll();
}

function toggleSection(id) {
  document.getElementById('section-'+id).classList.toggle('collapsed');
}

// ── SIDEBAR INVENTORY ─────────────────────────────────────────────────────
function updateSidebarInv(state) {
  // Find most recently checked task that has an inv snapshot
  let snap = null;
  for (let i = INV_IDS.length - 1; i >= 0; i--) {
    if (state[INV_IDS[i]]) { snap = INV_MAP[INV_IDS[i]]; break; }
  }

  document.getElementById('sidebar-label').textContent = snap ? snap.label : 'Starting out...';
  document.getElementById('sidebar-location').textContent = snap ? snap.location : '📍 —';

  const grid = document.getElementById('sidebar-inv');
  if (!snap || snap.items.length === 0) {
    grid.innerHTML = Array(28).fill('<div class="inv-slot" style="opacity:0.1"><span class="item-icon">⬜</span></div>').join('');
    return;
  }

  const slots = snap.items.map(item => {
    const cls = 'inv-slot' + (item.eq ? ' equipped' : '');
    const qty = item.qty ? `<span class="item-qty">${item.qty}</span>` : '';
    return `<div class="${cls}" title="${item.name}${item.eq?' (equipped)':''}">${qty}<span class="item-icon">${item.icon}</span><span class="item-name">${item.name}</span></div>`;
  });
  while (slots.length < 28) slots.push('<div class="inv-slot" style="opacity:0.1"><span class="item-icon">⬜</span></div>');
  grid.innerHTML = slots.slice(0,28).join('');
}

// ── PROGRESS ──────────────────────────────────────────────────────────────
function updateAll() {
  const state = getState();
  let total = 0, done = 0;
  SECTIONS.forEach(s => {
    const t = s.tasks.length, d = s.tasks.filter(t => state[t.id]).length;
    total += t; done += d;
    const pct = t ? Math.round(d/t*100) : 0;
    const ce = document.querySelector(`#section-${s.id} .section-count`);
    const fe = document.querySelector(`#section-${s.id} .section-mini-fill`);
    if (ce) ce.textContent = `${d}/${t}`;
    if (fe) fe.style.width = pct+'%';
  });
  const gp = total ? Math.round(done/total*100) : 0;
  document.getElementById('global-bar').style.width = gp+'%';
  document.getElementById('global-count').textContent = `${done} / ${total} tasks`;
  document.getElementById('global-pct').textContent = gp+'%';
  updateNav(state);
  updateSidebarInv(state);
}

function updateNav(state) {
  document.getElementById('nav-list').innerHTML = SECTIONS.map(s => {
    const total = s.tasks.length, done = s.tasks.filter(t => state[t.id]).length;
    const cls = done===total ? 'done' : done>0 ? 'partial' : '';
    return `<a class="nav-item ${cls}" href="#section-${s.id}"><span class="nav-dot"></span>${s.title}</a>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────────
function init() {
  const state = getState();
  document.getElementById('sections-container').innerHTML = SECTIONS.map(s => buildSectionHTML(s, state)).join('');
  updateAll();
}
init();
</script>
